<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifishial Intelligence v3.3 (cone+perf+fe)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080e14;
      color: #c8e6f0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; }

    /* ── HUD ─────────────────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 10;
    }

    .hud-row {
      display: flex;
      gap: 18px;
    }

    .hud-badge {
      background: rgba(8, 22, 32, 0.82);
      border: 1px solid #1e4a5c;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: #7ecfe0;
    }

    .hud-badge span { color: #e0f4ff; font-weight: bold; }
    .hud-title { font-size: 15px; font-weight: bold; color: #4ae0c8; letter-spacing: 0.12em; }

    /* ── Status / connection ─────────────────────────────────────────────── */
    #status {
      position: fixed;
      top: 14px;
      right: 14px;
      background: rgba(8,22,32,0.82);
      border: 1px solid #1e4a5c;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 0.05em;
      z-index: 10;
    }

    #status.ok   { border-color: #1a7a5c; color: #4ae0b0; }
    #status.warn { border-color: #7a5a1a; color: #e0c04a; }
    #status.err  { border-color: #7a1a1a; color: #e04a4a; }

    /* ── Compass ─────────────────────────────────────────────────────────── */
    #compass {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 72px;
      height: 72px;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Ground truth panel ──────────────────────────────────────────────── */
    #gt-panel {
      position: fixed;
      bottom: 14px;
      left: 14px;
      background: rgba(8,22,32,0.82);
      border: 1px solid #1e4a5c;
      border-radius: 6px;
      padding: 8px 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      min-width: 160px;
    }

    #gt-panel .gt-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #4ae0c8;
      text-transform: uppercase;
    }

    .gt-btn {
      background: rgba(30,74,92,0.5);
      border: 1px solid #1e4a5c;
      border-radius: 3px;
      color: #7ecfe0;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      text-align: center;
      transition: background 0.15s;
    }

    .gt-btn:hover { background: rgba(30,74,92,0.9); }
    .gt-btn.active { border-color: #4ae0c8; color: #4ae0c8; }

    /* ── Replay controls ─────────────────────────────────────────────────── */
    #replay-panel {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,22,32,0.90);
      border: 1px solid #1e4a5c;
      border-radius: 6px;
      padding: 10px 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      min-width: 340px;
      align-items: center;
    }

    #replay-panel .rp-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #4ae0c8;
      text-transform: uppercase;
      align-self: flex-start;
    }

    #replay-slider {
      width: 100%;
      accent-color: #4ae0c8;
      cursor: pointer;
    }

    #replay-time {
      font-size: 11px;
      color: #7ecfe0;
      align-self: flex-end;
    }

    .rp-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .rp-btn {
      background: rgba(30,74,92,0.5);
      border: 1px solid #1e4a5c;
      border-radius: 3px;
      color: #7ecfe0;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      transition: background 0.15s;
    }

    .rp-btn:hover { background: rgba(30,74,92,0.9); }
    .rp-btn.active { border-color: #4ae0c8; color: #4ae0c8; }

    #speed-select {
      background: rgba(8,22,32,0.9);
      border: 1px solid #1e4a5c;
      border-radius: 3px;
      color: #7ecfe0;
      font-family: inherit;
      font-size: 11px;
      padding: 3px 6px;
      cursor: pointer;
    }

    #speed-select:focus { outline: none; border-color: #4ae0c8; }

    /* ── Fish finder panel ───────────────────────────────────────────────────── */
    #ff-panel {
      position: fixed;
      top: 60px;
      right: 14px;
      background: rgba(8,22,32,0.92);
      border: 1px solid #1e4a5c;
      border-radius: 6px;
      padding: 8px;
      z-index: 10;
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    #ff-panel .ff-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #4ae0c8;
      text-transform: uppercase;
    }

    #ff-wrap {
      display: flex;
      gap: 4px;
      align-items: stretch;
    }

    #ff-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 9px;
      color: #4a7a8a;
      padding-bottom: 2px;
      min-width: 24px;
      text-align: right;
    }

    #ff-canvas {
      display: block;
      image-rendering: pixelated;
    }

    .ff-tabs {
      display: flex;
      gap: 4px;
    }

    .ff-tab {
      flex: 1;
      background: rgba(30,74,92,0.4);
      border: 1px solid #1e4a5c;
      border-radius: 3px;
      color: #7ecfe0;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 0;
      text-align: center;
      transition: background 0.15s;
    }

    .ff-tab:hover  { background: rgba(30,74,92,0.9); }
    .ff-tab.active { border-color: #4ae0c8; color: #4ae0c8; }

    /* ── Pick tooltip ────────────────────────────────────────────────────────── */
    #pick-tooltip {
      position: fixed;
      background: rgba(8,22,32,0.92);
      border: 1px solid #4ae0c8;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      color: #e0f4ff;
      pointer-events: none;
      z-index: 20;
      display: none;
      line-height: 1.7;
      white-space: nowrap;
    }
    #pick-tooltip .pick-label { color: #4ae0c8; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-badge hud-title">ARTIFISHIAL INTELLIGENCE v3.3 (cone+perf+fe)</div>
  <div class="hud-row">
    <div class="hud-badge">POINTS <span id="hud-points">0</span></div>
    <div class="hud-badge">DEPTH <span id="hud-depth">—</span> m</div>
    <div class="hud-badge">SPEED <span id="hud-speed">—</span> kts</div>
    <div class="hud-badge">HDG <span id="hud-heading">—</span>°</div>
    <div class="hud-badge">FPS <span id="hud-fps">—</span></div>
    <div class="hud-badge">PC <span id="hud-pcms">—</span> ms</div>
  </div>
</div>

<!-- Connection status -->
<div id="status" class="warn">CONNECTING…</div>

<!-- Compass -->
<canvas id="compass" width="72" height="72"></canvas>

<!-- Fish finder panel -->
<div id="ff-panel">
  <div class="ff-title">FISH FINDER</div>
  <div class="ff-tabs">
    <button class="ff-tab active" id="ff-tab-down">DOWN</button>
    <button class="ff-tab"        id="ff-tab-fwd">FORWARD</button>
  </div>
  <div id="ff-wrap">
    <div id="ff-axis"></div>
    <canvas id="ff-canvas" width="280" height="360"></canvas>
  </div>
  <canvas id="ff-fwd-canvas" width="280" height="200" style="display:none;image-rendering:pixelated;"></canvas>
</div>

<!-- Ground truth panel -->
<div id="gt-panel">
  <div class="gt-title">GROUND TRUTH</div>
  <button class="gt-btn active" id="btn-fish">Show Fish</button>
  <button class="gt-btn active" id="btn-floor">Show Floor</button>
  <button class="gt-btn" id="btn-ff">Fish Finder</button>
  <button class="gt-btn active" id="btn-cone">Show Cone</button>
</div>

<!-- Replay controls -->
<div id="replay-panel">
  <div class="rp-title">REPLAY</div>
  <input type="range" id="replay-slider" min="0" max="1000" value="0" step="1" />
  <div id="replay-time">0:00 / 0:00</div>
  <div class="rp-controls">
    <button class="rp-btn" id="btn-pause-play">⏸ PAUSE</button>
    <label style="font-size:11px;color:#7ecfe0;">SPEED</label>
    <select id="speed-select">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
      <option value="4">4×</option>
      <option value="8">8×</option>
    </select>
  </div>
</div>

<!-- Pick tooltip -->
<div id="pick-tooltip"></div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
//  OrbitControls (inline, r134 compatible)
// ─────────────────────────────────────────────────────────────────────────────
(function(){
  THREE.OrbitControls = function(object, domElement) {
    this.object = object;
    this.domElement = domElement || document;
    this.enabled = true;
    this.target = new THREE.Vector3();
    this.minDistance = 0; this.maxDistance = Infinity;
    this.minPolarAngle = 0; this.maxPolarAngle = Math.PI;
    this.minAzimuthAngle = -Infinity; this.maxAzimuthAngle = Infinity;
    this.enableDamping = false; this.dampingFactor = 0.05;
    this.enableZoom = true; this.zoomSpeed = 1.0;
    this.enableRotate = true; this.rotateSpeed = 1.0;
    this.enablePan = true; this.panSpeed = 1.0;
    this.screenSpacePanning = true;
    this.autoRotate = false; this.autoRotateSpeed = 2.0;

    var scope = this;
    var STATE = { NONE:-1, ROTATE:0, DOLLY:1, PAN:2, TOUCH_ROTATE:3, TOUCH_PAN:4, TOUCH_DOLLY_PAN:5 };
    var state = STATE.NONE;
    var EPS = 1e-6;
    var spherical = new THREE.Spherical();
    var sphericalDelta = new THREE.Spherical();
    var scale = 1;
    var panOffset = new THREE.Vector3();
    var rotateStart = new THREE.Vector2(), rotateEnd = new THREE.Vector2(), rotateDelta = new THREE.Vector2();
    var panStart = new THREE.Vector2(), panEnd = new THREE.Vector2(), panDelta = new THREE.Vector2();
    var dollyStart = new THREE.Vector2(), dollyEnd = new THREE.Vector2(), dollyDelta = new THREE.Vector2();

    function getAutoRotationAngle(){ return 2*Math.PI/60/60*scope.autoRotateSpeed; }
    function getZoomScale(){ return Math.pow(0.95, scope.zoomSpeed); }
    function rotateLeft(a){ sphericalDelta.theta -= a; }
    function rotateUp(a){ sphericalDelta.phi -= a; }

    var panLeftV = new THREE.Vector3();
    function panLeft(dist, m){ panLeftV.setFromMatrixColumn(m,0); panLeftV.multiplyScalar(-dist); panOffset.add(panLeftV); }
    var panUpV = new THREE.Vector3();
    function panUp(dist, m){
      if(scope.screenSpacePanning){ panUpV.setFromMatrixColumn(m,1); }
      else { panUpV.setFromMatrixColumn(m,0); panUpV.crossVectors(scope.object.up, panUpV); }
      panUpV.multiplyScalar(dist); panOffset.add(panUpV);
    }
    var panOffset2 = new THREE.Vector2();
    function pan(dx, dy){
      var el = scope.domElement;
      if(scope.object.isPerspectiveCamera){
        var pos = scope.object.position;
        var tgt = scope.target;
        var dist2 = pos.distanceTo(tgt);
        dist2 *= Math.tan((scope.object.fov/2)*Math.PI/180)*2;
        panLeft(dx*dist2/el.clientHeight, scope.object.matrix);
        panUp(dy*dist2/el.clientHeight, scope.object.matrix);
      }
    }
    function dollyIn(ds){ scale /= ds; }
    function dollyOut(ds){ scale *= ds; }

    this.update = function(){
      var offset = new THREE.Vector3();
      var quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0,1,0));
      var quatInverse = quat.clone().invert();
      var lastPos = new THREE.Vector3();
      var lastQuat = new THREE.Quaternion();
      return function update(){
        var position = scope.object.position;
        offset.copy(position).sub(scope.target);
        offset.applyQuaternion(quat);
        spherical.setFromVector3(offset);
        if(scope.autoRotate && state === STATE.NONE) rotateLeft(getAutoRotationAngle());
        if(scope.enableDamping){
          spherical.theta += sphericalDelta.theta * scope.dampingFactor;
          spherical.phi   += sphericalDelta.phi   * scope.dampingFactor;
        } else {
          spherical.theta += sphericalDelta.theta;
          spherical.phi   += sphericalDelta.phi;
        }
        spherical.theta = Math.max(scope.minAzimuthAngle, Math.min(scope.maxAzimuthAngle, spherical.theta));
        spherical.phi   = Math.max(scope.minPolarAngle,   Math.min(scope.maxPolarAngle,   spherical.phi));
        spherical.makeSafe();
        spherical.radius *= scale;
        spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
        scope.target.addScaledVector(panOffset, scope.enableDamping ? scope.dampingFactor : 1);
        offset.setFromSpherical(spherical);
        offset.applyQuaternion(quatInverse);
        position.copy(scope.target).add(offset);
        scope.object.lookAt(scope.target);
        if(scope.enableDamping){ sphericalDelta.theta *= (1-scope.dampingFactor); sphericalDelta.phi *= (1-scope.dampingFactor); panOffset.multiplyScalar(1-scope.dampingFactor); }
        else { sphericalDelta.set(0,0,0); panOffset.set(0,0,0); }
        scale = 1;
        if(lastPos.distanceToSquared(scope.object.position) > EPS || 8*(1-lastQuat.dot(scope.object.quaternion)) > EPS){ lastPos.copy(scope.object.position); lastQuat.copy(scope.object.quaternion); return true; }
        return false;
      };
    }();

    this.dispose = function(){
      scope.domElement.removeEventListener('contextmenu', onContextMenu);
      scope.domElement.removeEventListener('mousedown', onMouseDown);
      scope.domElement.removeEventListener('wheel', onMouseWheel);
      scope.domElement.removeEventListener('touchstart', onTouchStart);
      scope.domElement.removeEventListener('touchend', onTouchEnd);
      scope.domElement.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    };

    function onMouseDown(e){
      if(!scope.enabled) return;
      e.preventDefault();
      if(e.button===0){ if(!scope.enableRotate) return; rotateStart.set(e.clientX,e.clientY); state=STATE.ROTATE; }
      else if(e.button===1){ if(!scope.enableZoom) return; dollyStart.set(e.clientX,e.clientY); state=STATE.DOLLY; }
      else if(e.button===2){ if(!scope.enablePan) return; panStart.set(e.clientX,e.clientY); state=STATE.PAN; }
      if(state!==STATE.NONE){ document.addEventListener('mousemove',onMouseMove); document.addEventListener('mouseup',onMouseUp); }
    }
    function onMouseMove(e){
      if(!scope.enabled) return;
      e.preventDefault();
      if(state===STATE.ROTATE){
        rotateEnd.set(e.clientX,e.clientY); rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);
        var el = scope.domElement;
        rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight);
        rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);
        rotateStart.copy(rotateEnd); scope.update();
      } else if(state===STATE.DOLLY){
        dollyEnd.set(e.clientX,e.clientY); dollyDelta.subVectors(dollyEnd,dollyStart);
        if(dollyDelta.y>0) dollyIn(getZoomScale()); else if(dollyDelta.y<0) dollyOut(getZoomScale());
        dollyStart.copy(dollyEnd); scope.update();
      } else if(state===STATE.PAN){
        panEnd.set(e.clientX,e.clientY); panDelta.subVectors(panEnd,panStart).multiplyScalar(scope.panSpeed);
        pan(panDelta.x, panDelta.y); panStart.copy(panEnd); scope.update();
      }
    }
    function onMouseUp(){ document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); state=STATE.NONE; }
    function onMouseWheel(e){
      if(!scope.enabled||!scope.enableZoom) return;
      e.preventDefault(); e.stopPropagation();
      if(e.deltaY<0) dollyOut(getZoomScale()); else if(e.deltaY>0) dollyIn(getZoomScale());
      scope.update();
    }
    function onTouchStart(e){
      if(!scope.enabled) return;
      e.preventDefault();
      switch(e.touches.length){
        case 1: if(!scope.enableRotate) return; rotateStart.set(e.touches[0].pageX,e.touches[0].pageY); state=STATE.TOUCH_ROTATE; break;
        case 2: if(!scope.enableZoom&&!scope.enablePan) return;
          var dx=e.touches[0].pageX-e.touches[1].pageX, dy=e.touches[0].pageY-e.touches[1].pageY;
          dollyStart.set(0,Math.sqrt(dx*dx+dy*dy)); state=STATE.TOUCH_DOLLY_PAN; break;
      }
    }
    function onTouchMove(e){
      if(!scope.enabled) return; e.preventDefault(); e.stopPropagation();
      switch(e.touches.length){
        case 1: if(!scope.enableRotate||state!==STATE.TOUCH_ROTATE) return;
          rotateEnd.set(e.touches[0].pageX,e.touches[0].pageY); rotateDelta.subVectors(rotateEnd,rotateStart).multiplyScalar(scope.rotateSpeed);
          var el=scope.domElement; rotateLeft(2*Math.PI*rotateDelta.x/el.clientHeight); rotateUp(2*Math.PI*rotateDelta.y/el.clientHeight);
          rotateStart.copy(rotateEnd); scope.update(); break;
        case 2:
          if(state!==STATE.TOUCH_DOLLY_PAN) return;
          var dx2=e.touches[0].pageX-e.touches[1].pageX, dy2=e.touches[0].pageY-e.touches[1].pageY;
          dollyEnd.set(0,Math.sqrt(dx2*dx2+dy2*dy2)); dollyDelta.set(0,Math.pow(dollyEnd.y/dollyStart.y,scope.zoomSpeed));
          dollyIn(dollyDelta.y); dollyStart.copy(dollyEnd);
          panEnd.set((e.touches[0].pageX+e.touches[1].pageX)/2,(e.touches[0].pageY+e.touches[1].pageY)/2);
          panDelta.subVectors(panEnd,panStart).multiplyScalar(scope.panSpeed);
          pan(panDelta.x,panDelta.y); panStart.copy(panEnd); scope.update(); break;
      }
    }
    function onTouchEnd(){ state=STATE.NONE; }
    function onContextMenu(e){ if(!scope.enabled) return; e.preventDefault(); }
    scope.domElement.addEventListener('contextmenu', onContextMenu);
    scope.domElement.addEventListener('mousedown', onMouseDown);
    scope.domElement.addEventListener('wheel', onMouseWheel, {passive:false});
    scope.domElement.addEventListener('touchstart', onTouchStart, {passive:false});
    scope.domElement.addEventListener('touchend', onTouchEnd);
    scope.domElement.addEventListener('touchmove', onTouchMove, {passive:false});
    this.update();
  };
})();

// ─────────────────────────────────────────────────────────────────────────────
//  Scene setup
// ─────────────────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x080e14);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080e14, 0.004);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.up.set(0, 0, 1);   // Z-up
// Start from a side angle so the water column is visible:
// boat at Z=0, floor at Z≈-20m, camera slightly below surface looking across
camera.position.set(-60, -100, -8);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(20, 0, -12);   // look at mid-water-column
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = false;
controls.minDistance = 5;
controls.maxDistance = 2000;
controls.update();

// Ambient + directional
scene.add(new THREE.AmbientLight(0x0a1e2e, 2.5));
const dirLight = new THREE.DirectionalLight(0x4ae0c8, 0.6);
dirLight.position.set(100, 100, 200);
scene.add(dirLight);

// ── Water surface plane at Z=0 ────────────────────────────────────────────────
// Gives context: boat sits on this, floor is below, points are underwater.
{
  const waterGeo = new THREE.PlaneGeometry(600, 600);
  const waterMat = new THREE.MeshPhongMaterial({
    color: 0x0a2a44,
    transparent: true,
    opacity: 0.38,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  // PlaneGeometry is XY; rotate so it lies in the XY plane at Z=0 (Z-up scene)
  water.rotation.x = Math.PI / 2;
  scene.add(water);
}

// Grid on the water surface
const gridHelper = new THREE.GridHelper(400, 40, 0x0e2a38, 0x0a1e28);
gridHelper.rotation.x = Math.PI / 2;
scene.add(gridHelper);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
//  Depth colour helper  (shallow=sandy tan  →  deep=dark navy)
// ─────────────────────────────────────────────────────────────────────────────
const _cShallow = new THREE.Color(0xc8a87a);  // sandy tan
const _cMid     = new THREE.Color(0x1e6080);  // teal mid
const _cDeep    = new THREE.Color(0x091828);  // dark navy

function depthColour(depth, maxDepth) {
  const t = Math.min(1, Math.max(0, depth / (maxDepth || 20)));
  const c = new THREE.Color();
  if (t < 0.5) {
    c.lerpColors(_cShallow, _cMid, t * 2);
  } else {
    c.lerpColors(_cMid, _cDeep, (t - 0.5) * 2);
  }
  return c;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Point cloud — split into FLOOR (cumulative, append-only) and FISH
//  (small, replaced each frame). The server sends floor as a delta so
//  steady-state per-frame work is O(new points) rather than O(total).
// ─────────────────────────────────────────────────────────────────────────────
const pcMaterial = new THREE.PointsMaterial({
  size: 1.4, vertexColors: true, sizeAttenuation: true,
  transparent: true, opacity: 0.92,
});

// Floor mesh: one big buffer that grows; only the new tail is touched each frame.
const floorGeo  = new THREE.BufferGeometry();
let _floorPosBuf  = new Float32Array(1024 * 3);
let _floorColBuf  = new Float32Array(1024 * 3);
let _floorPosAttr = new THREE.BufferAttribute(_floorPosBuf, 3);
let _floorColAttr = new THREE.BufferAttribute(_floorColBuf, 3);
_floorPosAttr.setUsage(THREE.DynamicDrawUsage);
_floorColAttr.setUsage(THREE.DynamicDrawUsage);
floorGeo.setAttribute('position', _floorPosAttr);
floorGeo.setAttribute('color',    _floorColAttr);
floorGeo.setDrawRange(0, 0);
const floorPoints = new THREE.Points(floorGeo, pcMaterial);
scene.add(floorPoints);

// Fish mesh: rewritten each frame.
const fishGeo  = new THREE.BufferGeometry();
let _fishPosBuf  = new Float32Array(256 * 3);
let _fishColBuf  = new Float32Array(256 * 3);
let _fishPosAttr = new THREE.BufferAttribute(_fishPosBuf, 3);
let _fishColAttr = new THREE.BufferAttribute(_fishColBuf, 3);
_fishPosAttr.setUsage(THREE.DynamicDrawUsage);
_fishColAttr.setUsage(THREE.DynamicDrawUsage);
fishGeo.setAttribute('position', _fishPosAttr);
fishGeo.setAttribute('color',    _fishColAttr);
fishGeo.setDrawRange(0, 0);
const fishPoints = new THREE.Points(fishGeo, pcMaterial);
scene.add(fishPoints);

function _floorEnsureCapacity(n) {
  if (n * 3 <= _floorPosBuf.length) return;
  let cap = _floorPosBuf.length / 3;
  while (cap < n) cap *= 2;
  const newPos = new Float32Array(cap * 3);
  const newCol = new Float32Array(cap * 3);
  newPos.set(_floorPosBuf); newCol.set(_floorColBuf);
  _floorPosBuf  = newPos;
  _floorColBuf  = newCol;
  _floorPosAttr = new THREE.BufferAttribute(_floorPosBuf, 3);
  _floorColAttr = new THREE.BufferAttribute(_floorColBuf, 3);
  _floorPosAttr.setUsage(THREE.DynamicDrawUsage);
  _floorColAttr.setUsage(THREE.DynamicDrawUsage);
  floorGeo.setAttribute('position', _floorPosAttr);
  floorGeo.setAttribute('color',    _floorColAttr);
}

function _fishEnsureCapacity(n) {
  if (n * 3 <= _fishPosBuf.length) return;
  let cap = _fishPosBuf.length / 3;
  while (cap < n) cap *= 2;
  _fishPosBuf  = new Float32Array(cap * 3);
  _fishColBuf  = new Float32Array(cap * 3);
  _fishPosAttr = new THREE.BufferAttribute(_fishPosBuf, 3);
  _fishColAttr = new THREE.BufferAttribute(_fishColBuf, 3);
  _fishPosAttr.setUsage(THREE.DynamicDrawUsage);
  _fishColAttr.setUsage(THREE.DynamicDrawUsage);
  fishGeo.setAttribute('position', _fishPosAttr);
  fishGeo.setAttribute('color',    _fishColAttr);
}

// 256-entry RGB palette for floor depth colouring (shallow → mid → deep).
// Index = round(depth_t * 255). Pre-built once; lerp via integer indexing.
const _depthPalette = new Float32Array(256 * 3);
(function buildDepthPalette() {
  const tmp = new THREE.Color();
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    if (t < 0.5) tmp.lerpColors(_cShallow, _cMid, t * 2);
    else         tmp.lerpColors(_cMid,     _cDeep,(t - 0.5) * 2);
    _depthPalette[i*3]   = tmp.r;
    _depthPalette[i*3+1] = tmp.g;
    _depthPalette[i*3+2] = tmp.b;
  }
})();

let _floorN        = 0;     // total floor points buffered
let _floorMaxD     = 1;     // cached max floor depth (drives palette mapping)
let _floorDepthSum = 0;     // running sum of floor depths for HUD average
let _pcMsEMA       = null;  // EMA of updatePointCloud cost (ms)

// Walk a depth slice, write palette colours, optionally apply forward-scan
// muted-cyan tint when conf <= 0.45.
function _colourFloorRange(start, count, depth, conf, depthOffset, confOffset) {
  const invMaxD = 1 / _floorMaxD;
  for (let i = 0; i < count; i++) {
    const w   = (start + i) * 3;
    const dRaw = depth[depthOffset + i];
    let t = dRaw * invMaxD;
    if (t > 1) t = 1; else if (t < 0) t = 0;
    const pi = ((t * 255) | 0) * 3;
    let r = _depthPalette[pi], g = _depthPalette[pi+1], b = _depthPalette[pi+2];
    const c = conf ? (conf[confOffset + i] || 0) : 1;
    if (c <= 0.45) {
      // Forward-scan floor return — muted cyan
      r = r * 0.55;
      g = g * 0.85 + 0.15;
      b = b * 0.85 + 0.15;
    }
    _floorColBuf[w]   = r;
    _floorColBuf[w+1] = g;
    _floorColBuf[w+2] = b;
  }
}

function updatePointCloud(pc) {
  // pc = { reset, floor_offset, floor_total, floor:{x,y,depth,confidence}, fish:{...} }
  if (!pc) return;

  // ── Floor: append delta (or reset + write from offset 0) ─────────────────
  if (pc.reset) {
    _floorN = 0;
    _floorDepthSum = 0;
  }
  const f = pc.floor || {};
  const fx = f.x || [], fy = f.y || [], fd = f.depth || [], fc = f.confidence || [];
  const newN     = fx.length;
  const offset   = pc.floor_offset | 0;
  const total    = pc.floor_total  | 0;

  if (newN > 0) {
    _floorEnsureCapacity(offset + newN);
    // Write positions at the offset.
    for (let i = 0; i < newN; i++) {
      const w = (offset + i) * 3;
      _floorPosBuf[w]   = fx[i];
      _floorPosBuf[w+1] = fy[i];
      _floorPosBuf[w+2] = -fd[i];
    }
    // Track max depth among the new points; if it changed, recolour all floor.
    let maxD = _floorMaxD, deltaSum = 0;
    for (let i = 0; i < newN; i++) {
      deltaSum += fd[i];
      if (fd[i] > maxD) maxD = fd[i];
    }
    _floorDepthSum += deltaSum;
    const maxChanged = maxD !== _floorMaxD;
    _floorMaxD = maxD;
    if (maxChanged && offset > 0) {
      // Recolour all previously written floor points (read depth back from
      // buffer, where it's stored as -Z).
      for (let i = 0; i < offset; i++) {
        const w = i * 3;
        const dRaw = -_floorPosBuf[w + 2];
        let t = dRaw / _floorMaxD;
        if (t > 1) t = 1; else if (t < 0) t = 0;
        const pi = ((t * 255) | 0) * 3;
        // Forward-scan/regular distinction is lost on recolour — fine,
        // since maxD changes are rare and the cyan tint is a small visual.
        _floorColBuf[w]   = _depthPalette[pi];
        _floorColBuf[w+1] = _depthPalette[pi+1];
        _floorColBuf[w+2] = _depthPalette[pi+2];
      }
    }
    // Colour the new tail (with conf-based forward-scan tint).
    _colourFloorRange(offset, newN, fd, fc, 0, 0);

    _floorPosAttr.needsUpdate = true;
    _floorColAttr.needsUpdate = true;
  }
  _floorN = total;
  floorGeo.setDrawRange(0, _floorN);

  // ── Fish: rewrite from scratch each frame ────────────────────────────────
  const fish = pc.fish || {};
  const ffx = fish.x || [], ffy = fish.y || [], ffd = fish.depth || [], ffc = fish.confidence || [];
  const fishN = ffx.length;
  if (fishN > 0) {
    _fishEnsureCapacity(fishN);
    for (let i = 0; i < fishN; i++) {
      const w = i * 3;
      _fishPosBuf[w]   = ffx[i];
      _fishPosBuf[w+1] = ffy[i];
      _fishPosBuf[w+2] = -ffd[i];
      let cv = (ffc[i] || 0) * (1 / 0.65);
      if (cv > 1) cv = 1; else if (cv < 0) cv = 0;
      _fishColBuf[w]   = cv;
      _fishColBuf[w+1] = 0.55 * cv;
      _fishColBuf[w+2] = 0.05 * cv;
    }
    _fishPosAttr.needsUpdate = true;
    _fishColAttr.needsUpdate = true;
  }
  fishGeo.setDrawRange(0, fishN);

  // HUD: total point count + running average floor depth
  const totalPts = _floorN + fishN;
  document.getElementById('hud-points').textContent = totalPts;
  if (_floorN > 0) {
    document.getElementById('hud-depth').textContent =
      (_floorDepthSum / _floorN).toFixed(1);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Scanned seafloor mesh (from map_update.mesh — live Delaunay)
// ─────────────────────────────────────────────────────────────────────────────
let scanMesh = null;

function updateScanMesh(meshData) {
  if (!meshData || !meshData.vertices || !meshData.faces) return;
  if (scanMesh) { scene.remove(scanMesh); scanMesh.geometry.dispose(); }

  const verts  = meshData.vertices;
  const faces  = meshData.faces;

  // Depth = -vertex.z (server stores it as -depth). Compute maxD inline
  // rather than shipping a separate depth array.
  let maxD = 1;
  for (let i = 0; i < verts.length; i++) {
    const d = -verts[i][2];
    if (d > maxD) maxD = d;
  }

  const geo  = new THREE.BufferGeometry();
  const pos  = new Float32Array(verts.length * 3);
  const col  = new Float32Array(verts.length * 3);

  for (let i = 0; i < verts.length; i++) {
    pos[i*3]   = verts[i][0];
    pos[i*3+1] = verts[i][1];
    pos[i*3+2] = verts[i][2];   // already -depth from server
    const d = -verts[i][2];
    const c = depthColour(d, maxD);
    col[i*3]   = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
  }

  const idx = new Uint32Array(faces.length * 3);
  for (let i = 0; i < faces.length; i++) {
    idx[i*3] = faces[i][0]; idx[i*3+1] = faces[i][1]; idx[i*3+2] = faces[i][2];
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setIndex(new THREE.BufferAttribute(idx, 1));
  geo.computeVertexNormals();

  scanMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
    vertexColors: true, transparent: true, opacity: 0.55,
    side: THREE.DoubleSide, depthWrite: false,
  }));
  scene.add(scanMesh);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Boat marker
// ─────────────────────────────────────────────────────────────────────────────
const boatGroup = new THREE.Group();
scene.add(boatGroup);

// Cone pointing forward
const boatCone = new THREE.Mesh(
  new THREE.ConeGeometry(3, 8, 8),
  new THREE.MeshPhongMaterial({ color: 0x4ae0c8, emissive: 0x1a6060 })
);
boatCone.rotation.x = Math.PI / 2;
boatGroup.add(boatCone);

// Heading ring
const ringGeo = new THREE.RingGeometry(4, 5, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x4ae0c8, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
const boatRing = new THREE.Mesh(ringGeo, ringMat);
boatGroup.add(boatRing);

// ─────────────────────────────────────────────────────────────────────────────
//  Forward-scan cone wedge — visualises the swept volume in front of the boat
//  Local frame: boatGroup has rotation.z = -heading, so the boat's forward
//  direction is +Y (north when heading = 0). Z = up; depth grows downward (-Z).
// ─────────────────────────────────────────────────────────────────────────────
const FWD_CONE_MAX_RANGE_M    = 40.0;
const FWD_CONE_BEAM_MIN_DEG   = 5.0;
const FWD_CONE_BEAM_MAX_DEG   = 64.0;
const FWD_CONE_AZ_HALF_DEG    = 30.0;

function buildForwardCone() {
  // Sample the wedge surface as a (azimuth × beam) grid of points, all at
  // MAX_RANGE. Adding the apex at (0,0,0) gives us a closed wedge mesh.
  const NA = 17;   // azimuth samples (visualization only — denser = smoother)
  const NB = 13;   // depression samples
  const positions = [0, 0, 0];   // index 0 = apex (boat)
  for (let ai = 0; ai < NA; ai++) {
    const az = (-FWD_CONE_AZ_HALF_DEG + ai * (2 * FWD_CONE_AZ_HALF_DEG) / (NA - 1))
               * Math.PI / 180;
    for (let bi = 0; bi < NB; bi++) {
      const dep = (FWD_CONE_BEAM_MIN_DEG + bi * (FWD_CONE_BEAM_MAX_DEG - FWD_CONE_BEAM_MIN_DEG) / (NB - 1))
                  * Math.PI / 180;
      const horiz = FWD_CONE_MAX_RANGE_M * Math.cos(dep);
      const x =  horiz * Math.sin(az);
      const y =  horiz * Math.cos(az);
      const z = -FWD_CONE_MAX_RANGE_M * Math.sin(dep);
      positions.push(x, y, z);
    }
  }

  const idx = (ai, bi) => 1 + ai * NB + bi;
  const indices = [];

  // Far-face quads (between adjacent azimuth and beam samples)
  for (let ai = 0; ai < NA - 1; ai++) {
    for (let bi = 0; bi < NB - 1; bi++) {
      const a = idx(ai,     bi);
      const b = idx(ai + 1, bi);
      const c = idx(ai + 1, bi + 1);
      const d = idx(ai,     bi + 1);
      indices.push(a, b, c,  a, c, d);
    }
  }
  // Side fans connecting the apex to the boundary curves
  // Top edge (shallowest beam, varying azimuth)
  for (let ai = 0; ai < NA - 1; ai++) {
    indices.push(0, idx(ai, 0), idx(ai + 1, 0));
  }
  // Bottom edge (steepest beam)
  for (let ai = 0; ai < NA - 1; ai++) {
    indices.push(0, idx(ai + 1, NB - 1), idx(ai, NB - 1));
  }
  // Left edge (min azimuth, varying beam)
  for (let bi = 0; bi < NB - 1; bi++) {
    indices.push(0, idx(0, bi + 1), idx(0, bi));
  }
  // Right edge (max azimuth)
  for (let bi = 0; bi < NB - 1; bi++) {
    indices.push(0, idx(NA - 1, bi), idx(NA - 1, bi + 1));
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const fillMat = new THREE.MeshBasicMaterial({
    color: 0x4ae0c8, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const fill = new THREE.Mesh(geo, fillMat);

  // Outline edges around the wedge boundary for readability
  const outlinePts = [];
  // Far-face boundary (4 edges around the spherical-cap rectangle)
  for (let bi = 0; bi < NB; bi++) {            // left edge (az = -half)
    const i = idx(0, bi) * 3;
    outlinePts.push(positions[i], positions[i+1], positions[i+2]);
  }
  for (let ai = 1; ai < NA; ai++) {            // bottom edge (max beam)
    const i = idx(ai, NB - 1) * 3;
    outlinePts.push(positions[i], positions[i+1], positions[i+2]);
  }
  for (let bi = NB - 2; bi >= 0; bi--) {       // right edge (az = +half)
    const i = idx(NA - 1, bi) * 3;
    outlinePts.push(positions[i], positions[i+1], positions[i+2]);
  }
  for (let ai = NA - 2; ai >= 0; ai--) {       // top edge (min beam)
    const i = idx(ai, 0) * 3;
    outlinePts.push(positions[i], positions[i+1], positions[i+2]);
  }
  // Apex spokes — four corners back to (0,0,0)
  const corners = [idx(0, 0), idx(NA - 1, 0), idx(NA - 1, NB - 1), idx(0, NB - 1)];
  const spokePts = [];
  for (const c of corners) {
    spokePts.push(0, 0, 0,
                  positions[c * 3], positions[c * 3 + 1], positions[c * 3 + 2]);
  }

  const outlineGeo = new THREE.BufferGeometry();
  outlineGeo.setAttribute('position',
    new THREE.BufferAttribute(new Float32Array(outlinePts), 3));
  const outline = new THREE.LineLoop(outlineGeo,
    new THREE.LineBasicMaterial({ color: 0x4ae0c8, transparent: true, opacity: 0.55 }));

  const spokeGeo = new THREE.BufferGeometry();
  spokeGeo.setAttribute('position',
    new THREE.BufferAttribute(new Float32Array(spokePts), 3));
  const spokes = new THREE.LineSegments(spokeGeo,
    new THREE.LineBasicMaterial({ color: 0x4ae0c8, transparent: true, opacity: 0.35 }));

  const group = new THREE.Group();
  group.add(fill);
  group.add(outline);
  group.add(spokes);
  return group;
}

const forwardCone = buildForwardCone();
boatGroup.add(forwardCone);

function updateBoat(boat) {
  if (!boat || boat.east === undefined) return;
  boatGroup.position.set(boat.east, boat.north, 0);
  // heading: 0° = north (+Y), positive = clockwise; Z-up scene
  const hdgRad = (boat.heading || 0) * Math.PI / 180;
  boatGroup.rotation.z = -hdgRad;

  document.getElementById('hud-heading').textContent =
    boat.heading !== undefined ? Math.round(boat.heading) : '—';
  document.getElementById('hud-speed').textContent =
    boat.speed_kts !== undefined ? boat.speed_kts.toFixed(1) : '—';

  updateCompass(boat.heading || 0);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Ground truth — floor mesh (built client-side from floor_grid)
// ─────────────────────────────────────────────────────────────────────────────
let gtFloorGroup = null;
let showFloor    = true;

function buildGroundTruthFloor(floor_grid) {
  if (gtFloorGroup) { scene.remove(gtFloorGroup); }
  gtFloorGroup = new THREE.Group();

  const { origin_east_m, origin_north_m, cell_size_m, rows, cols, depth_m } = floor_grid;

  // Collect valid vertices
  const positions = [];
  const colours   = [];
  const indices   = [];
  const vtxIndex  = Array.from({length: rows}, () => new Array(cols).fill(-1));

  let maxD = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (depth_m[r][c] !== null && depth_m[r][c] > maxD) maxD = depth_m[r][c];
  if (maxD === 0) maxD = 20;

  let vi = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = depth_m[r][c];
      if (d === null) { continue; }
      vtxIndex[r][c] = vi++;
      const ex = origin_east_m  + c * cell_size_m;
      const ny = origin_north_m + r * cell_size_m;
      positions.push(ex, ny, -d);
      const col = depthColour(d, maxD);
      colours.push(col.r, col.g, col.b);
    }
  }

  // Build quads as two triangles
  for (let r = 0; r < rows - 1; r++) {
    for (let c = 0; c < cols - 1; c++) {
      const a = vtxIndex[r][c];
      const b = vtxIndex[r][c+1];
      const d = vtxIndex[r+1][c];
      const e = vtxIndex[r+1][c+1];
      if (a < 0 || b < 0 || d < 0 || e < 0) continue;
      indices.push(a, b, d,  b, e, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(colours),   3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  // Solid surface — red so it's visually distinct from the sonar point cloud
  const solid = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
    color: 0xcc2222, transparent: true, opacity: 0.40,
    side: THREE.DoubleSide, depthWrite: false,
  }));
  gtFloorGroup.add(solid);

  // Wireframe overlay
  const wireGeo = new THREE.WireframeGeometry(geo);
  const wire = new THREE.LineSegments(wireGeo,
    new THREE.LineBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.25 }));
  gtFloorGroup.add(wire);

  scene.add(gtFloorGroup);
  gtFloorGroup.visible = showFloor;
}

// ─────────────────────────────────────────────────────────────────────────────
//  Ground truth — fish school markers
// ─────────────────────────────────────────────────────────────────────────────
let fishGroup = null;
let showFish  = true;

function _makeFishTexture() {
  const S = 128;
  const cv = document.createElement('canvas');
  cv.width = S; cv.height = S;
  const ctx = cv.getContext('2d');

  // Body gradient
  const grd = ctx.createRadialGradient(S*0.36, S*0.50, S*0.04, S*0.36, S*0.50, S*0.34);
  grd.addColorStop(0, '#fff8b0');
  grd.addColorStop(1, '#ffe066');

  ctx.beginPath();
  ctx.ellipse(S*0.36, S*0.50, S*0.28, S*0.19, 0, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Forked tail
  ctx.beginPath();
  ctx.moveTo(S*0.62, S*0.50);
  ctx.lineTo(S*0.90, S*0.26);
  ctx.lineTo(S*0.76, S*0.50);
  ctx.lineTo(S*0.90, S*0.74);
  ctx.closePath();
  ctx.fillStyle = '#ffe066';
  ctx.fill();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(S*0.26, S*0.32);
  ctx.quadraticCurveTo(S*0.38, S*0.12, S*0.54, S*0.32);
  ctx.closePath();
  ctx.fillStyle = '#ffd030';
  ctx.fill();

  // Eye (dark with white highlight)
  ctx.beginPath();
  ctx.arc(S*0.16, S*0.47, S*0.050, 0, Math.PI*2);
  ctx.fillStyle = '#1a1000';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(S*0.15, S*0.45, S*0.018, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  return new THREE.CanvasTexture(cv);
}

const _fishTex = _makeFishTexture();

let _fishSpheres = [];
let _fishSprites = [];

function buildFishMarkers(fish_schools) {
  if (fishGroup) { scene.remove(fishGroup); }
  fishGroup   = new THREE.Group();
  _fishSpheres = [];
  _fishSprites = [];

  for (const school of fish_schools) {
    const r  = school.radius_m || 8;
    const ex = school.east_m   || 0;
    const ny = school.north_m  || 0;
    const ez = -(school.depth_m || 5);

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(r, 24, 16),
      new THREE.MeshPhongMaterial({
        color: 0xffe066, emissive: 0x604a00,
        transparent: true, opacity: 0.14,
        side: THREE.DoubleSide, depthWrite: false,
      }),
    );
    sphere.position.set(ex, ny, ez);
    fishGroup.add(sphere);
    _fishSpheres.push(sphere);

    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: _fishTex, transparent: true, opacity: 0.95, depthWrite: false,
    }));
    sprite.scale.set(8, 4.6, 1);
    sprite.position.set(ex, ny, ez + r + 3);
    fishGroup.add(sprite);
    _fishSprites.push(sprite);
  }

  scene.add(fishGroup);
  fishGroup.visible = showFish;
}

function updateFishPositions(positions) {
  if (!fishGroup || positions.length !== _fishSprites.length) {
    buildFishMarkers(positions);
    return;
  }
  for (let i = 0; i < positions.length; i++) {
    const p  = positions[i];
    const ex = p.east_m  || 0;
    const ny = p.north_m || 0;
    const ez = -(p.depth_m || 5);
    const r  = p.radius_m || 8;
    _fishSpheres[i].position.set(ex, ny, ez);
    _fishSprites[i].position.set(ex, ny, ez + r + 3);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  Compass rose
// ─────────────────────────────────────────────────────────────────────────────
const compassCanvas = document.getElementById('compass');
const compassCtx    = compassCanvas.getContext('2d');

function updateCompass(headingDeg) {
  const ctx = compassCtx;
  const w = compassCanvas.width, h = compassCanvas.height, cx = w/2, cy = h/2, r = w/2 - 4;
  ctx.clearRect(0, 0, w, h);

  // Outer ring
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = '#1e4a5c'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle   = 'rgba(8,22,32,0.7)'; ctx.fill();

  // Cardinal labels (fixed)
  const labels = [['N',0],['E',90],['S',180],['W',270]];
  ctx.font = '9px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const [lbl, deg] of labels) {
    const a = (deg - 90) * Math.PI/180;
    const lx = cx + Math.cos(a) * (r - 9);
    const ly = cy + Math.sin(a) * (r - 9);
    ctx.fillStyle = lbl === 'N' ? '#4ae0c8' : '#4a7a8a';
    ctx.fillText(lbl, lx, ly);
  }

  // Heading needle
  const needleA = (headingDeg - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(needleA);
  ctx.beginPath();
  ctx.moveTo(0, -r+12); ctx.lineTo(3, 4); ctx.lineTo(-3, 4);
  ctx.closePath();
  ctx.fillStyle = '#4ae0c8'; ctx.fill();
  ctx.restore();

  // Centre dot
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
  ctx.fillStyle = '#4ae0c8'; ctx.fill();
}

updateCompass(0);

// ─────────────────────────────────────────────────────────────────────────────
//  WebSocket
// ─────────────────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
let ws = null;
let isReplayMode = false;

function fmtTime(s) {
  s = Math.floor(s || 0);
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function connect() {
  statusEl.className = 'warn';
  statusEl.textContent = 'CONNECTING…';

  ws = new WebSocket(`ws://${location.host}/ws/state`);
  // Server sends payloads as binary (orjson bytes) so we skip its UTF-8
  // validation hop; decode here with TextDecoder.
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    statusEl.className = 'ok';
    statusEl.textContent = 'LIVE';
  };

  ws.onclose = () => {
    statusEl.className = 'err';
    statusEl.textContent = 'DISCONNECTED';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => {
    statusEl.className = 'err';
    statusEl.textContent = 'ERROR';
  };

  const _wsDecoder = new TextDecoder('utf-8');
  ws.onmessage = (ev) => {
    let msg;
    try {
      const text = (typeof ev.data === 'string')
        ? ev.data
        : _wsDecoder.decode(ev.data);
      msg = JSON.parse(text);
    } catch { return; }

    switch (msg.type) {

      case 'session_info':
        isReplayMode = msg.duration_s != null;
        document.getElementById('replay-panel').style.display =
          isReplayMode ? 'flex' : 'none';
        if (isReplayMode) {
          const slider = document.getElementById('replay-slider');
          slider.max = 1000;
          document.getElementById('replay-time').textContent =
            `0:00 / ${fmtTime(msg.duration_s)}`;
        }
        statusEl.textContent = isReplayMode ? 'REPLAY' : 'LIVE';
        break;

      case 'ground_truth': {
        const { fish_schools, floor_grid } = msg.data;
        if (floor_grid)   buildGroundTruthFloor(floor_grid);
        if (fish_schools && fish_schools.length) buildFishMarkers(fish_schools);
        document.getElementById('gt-panel').style.display = 'flex';
        break;
      }

      case 'map_update':
        if (msg.pointcloud) {
          const _t0 = performance.now();
          updatePointCloud(msg.pointcloud);
          // EMA smoothing so the readout doesn't jitter every frame
          const dt = performance.now() - _t0;
          _pcMsEMA = _pcMsEMA == null ? dt : (_pcMsEMA * 0.8 + dt * 0.2);
          document.getElementById('hud-pcms').textContent = _pcMsEMA.toFixed(1);
        }
        if (msg.boat)          updateBoat(msg.boat);
        if (msg.mesh)          updateScanMesh(msg.mesh);
        if (msg.fish_positions) updateFishPositions(msg.fish_positions);
        ffHandleUpdate(msg);
        if (msg.forward_scan)  ffDrawForward(msg.forward_scan);

        // Replay controls
        if (msg.replay) {
          const rp = msg.replay;
          const slider = document.getElementById('replay-slider');
          if (!sliderDragging) {
            slider.value = Math.round((rp.fraction || 0) * 1000);
          }
          document.getElementById('replay-time').textContent =
            `${fmtTime(rp.position_s)} / ${fmtTime(rp.duration_s)}`;
          document.getElementById('btn-pause-play').textContent =
            rp.paused ? '▶ PLAY' : '⏸ PAUSE';
          document.getElementById('btn-pause-play').classList.toggle('active', !rp.paused);
        }
        break;
    }
  };
}

connect();

// ─────────────────────────────────────────────────────────────────────────────
//  Replay controls
// ─────────────────────────────────────────────────────────────────────────────
let sliderDragging = false;

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

const slider = document.getElementById('replay-slider');
slider.addEventListener('mousedown', () => { sliderDragging = true; });
slider.addEventListener('mouseup',   () => {
  sliderDragging = false;
  send({ type: 'seek', fraction: parseInt(slider.value) / 1000 });
});
slider.addEventListener('touchend',  () => {
  sliderDragging = false;
  send({ type: 'seek', fraction: parseInt(slider.value) / 1000 });
});

document.getElementById('btn-pause-play').addEventListener('click', () => {
  const btn = document.getElementById('btn-pause-play');
  if (btn.textContent.includes('PLAY')) {
    send({ type: 'play' });
  } else {
    send({ type: 'pause' });
  }
});

document.getElementById('speed-select').addEventListener('change', (e) => {
  send({ type: 'speed', value: parseFloat(e.target.value) });
});

// ─────────────────────────────────────────────────────────────────────────────
//  Ground truth toggles
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-fish').addEventListener('click', () => {
  showFish = !showFish;
  if (fishGroup) fishGroup.visible = showFish;
  document.getElementById('btn-fish').classList.toggle('active', showFish);
  document.getElementById('btn-fish').textContent = showFish ? 'Show Fish' : 'Hide Fish';
});

document.getElementById('btn-floor').addEventListener('click', () => {
  showFloor = !showFloor;

// ─────────────────────────────────────────────────────────────────────────────
//  Click-to-inspect (raycaster)
// ─────────────────────────────────────────────────────────────────────────────
const raycaster   = new THREE.Raycaster();
raycaster.params.Points.threshold = 1.5;   // pick radius for point cloud dots
const pickTooltip = document.getElementById('pick-tooltip');

// Marker: small sphere + two crosshair rings placed at the hit point
const pickMarker = (() => {
  const g = new THREE.Group();

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
  );
  g.add(sphere);

  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.55,
  });
  // Horizontal ring (XY plane — lies flat in Z-up scene)
  const ringH = new THREE.Mesh(new THREE.RingGeometry(1.6, 2.2, 32), ringMat);
  g.add(ringH);
  // Vertical ring (XZ plane — stands upright)
  const ringV = new THREE.Mesh(new THREE.RingGeometry(1.6, 2.2, 32), ringMat);
  ringV.rotation.x = Math.PI / 2;
  g.add(ringV);

  g.visible = false;
  scene.add(g);
  return g;
})();

let _ptrDownX = 0, _ptrDownY = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  _ptrDownX = e.clientX;
  _ptrDownY = e.clientY;
});

renderer.domElement.addEventListener('pointerup', (e) => {
  const dx = e.clientX - _ptrDownX;
  const dy = e.clientY - _ptrDownY;
  if (dx*dx + dy*dy > 25) return;   // was a drag, not a click

  const mouse = new THREE.Vector2(
     (e.clientX / window.innerWidth)  * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1,
  );
  raycaster.setFromCamera(mouse, camera);

  const targets = [];
  if (scanMesh) targets.push(scanMesh);
  if (gtFloorGroup && gtFloorGroup.visible) targets.push(gtFloorGroup.children[0]);
  targets.push(pointCloud);

  const hits = raycaster.intersectObjects(targets);
  if (hits.length === 0) { pickTooltip.style.display = 'none'; pickMarker.visible = false; return; }

  const pt    = hits[0].point;
  pickMarker.position.copy(pt);
  pickMarker.visible = true;
  const east  =  pt.x.toFixed(1);
  const north =  pt.y.toFixed(1);
  const depth = (-pt.z).toFixed(1);

  pickTooltip.innerHTML =
    `<span class="pick-label">E</span> ${east} m<br>` +
    `<span class="pick-label">N</span> ${north} m<br>` +
    `<span class="pick-label">D</span> ${depth} m`;

  pickTooltip.style.display = 'block';
  let tx = e.clientX + 14;
  let ty = e.clientY - 10;
  const tw = pickTooltip.offsetWidth;
  const th = pickTooltip.offsetHeight;
  if (tx + tw > window.innerWidth  - 8) tx = e.clientX - tw - 14;
  if (ty + th > window.innerHeight - 8) ty = e.clientY - th - 10;
  pickTooltip.style.left = tx + 'px';
  pickTooltip.style.top  = ty + 'px';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { pickTooltip.style.display = 'none'; pickMarker.visible = false; }
});

// ─────────────────────────────────────────────────────────────────────────────
//  WASD camera pan
//  Moves camera.position + controls.target together so orbit pivot stays in
//  sync and the raycaster (which reads camera directly) needs no changes.
// ─────────────────────────────────────────────────────────────────────────────
const _wasdKeys    = new Set();
const _wasdForward = new THREE.Vector3();
const _wasdRight   = new THREE.Vector3();
const _wasdMove    = new THREE.Vector3();

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  _wasdKeys.add(e.key.toLowerCase());
});
document.addEventListener('keyup', (e) => { _wasdKeys.delete(e.key.toLowerCase()); });

function _applyWASD() {
  if (_wasdKeys.size === 0) return;

  // Speed scales with camera distance so panning feels consistent when zoomed
  const speed = camera.position.distanceTo(controls.target) * 0.012;

  // Horizontal forward direction (flatten to XY plane — Z-up scene)
  camera.getWorldDirection(_wasdForward);
  _wasdForward.z = 0;
  if (_wasdForward.lengthSq() < 1e-6) return;
  _wasdForward.normalize();

  // Right = forward rotated 90° CW looking down in Z-up: (fy, -fx, 0)
  _wasdRight.set(_wasdForward.y, -_wasdForward.x, 0);

  _wasdMove.set(0, 0, 0);
  if (_wasdKeys.has('w')) _wasdMove.addScaledVector(_wasdForward,  speed);
  if (_wasdKeys.has('s')) _wasdMove.addScaledVector(_wasdForward, -speed);
  if (_wasdKeys.has('a')) _wasdMove.addScaledVector(_wasdRight,   -speed);
  if (_wasdKeys.has('d')) _wasdMove.addScaledVector(_wasdRight,    speed);

  camera.position.add(_wasdMove);
  controls.target.add(_wasdMove);
}

// ─────────────────────────────────────────────────────────────────────────────
//  Fish finder
// ─────────────────────────────────────────────────────────────────────────────
const ffPanel  = document.getElementById('ff-panel');
const ffCanvas = document.getElementById('ff-canvas');
const ffCtx    = ffCanvas.getContext('2d');
const FF_W     = ffCanvas.width;
const FF_H     = ffCanvas.height;
const FF_MAX_M = 60.0;   // must match generator MAX_RANGE_M
const FF_ECHO_N = 512;   // must match ECHO_SIZE

let ffVisible  = false;
let _ffLastTs  = null;

// Build a lookup table: echo amplitude 0-255 → [r,g,b]
// Classic fish finder palette: black → dark blue → cyan → green → yellow → red → white
const _ffLUT = new Uint8Array(256 * 3);
(function buildLUT() {
  const stops = [
    [0,   0,   0,  18],   // 0   → near-black
    [30,  0,  40, 100],   // 30  → dark blue
    [80,  0, 200, 200],   // 80  → cyan
    [130, 0, 220,  80],   // 130 → green
    [170,220, 220,   0],  // 170 → yellow
    [210,255, 100,   0],  // 210 → orange
    [240,255,   0,   0],  // 240 → red
    [255,255, 255, 255],  // 255 → white
  ];
  for (let a = 0; a < 256; a++) {
    let i = 0;
    while (i < stops.length - 2 && stops[i+1][0] <= a) i++;
    const [a0,r0,g0,b0] = stops[i];
    const [a1,r1,g1,b1] = stops[i+1];
    const t = (a - a0) / (a1 - a0);
    _ffLUT[a*3]   = r0 + (r1-r0)*t | 0;
    _ffLUT[a*3+1] = g0 + (g1-g0)*t | 0;
    _ffLUT[a*3+2] = b0 + (b1-b0)*t | 0;
  }
})();

// Build depth-axis labels
(function buildAxis() {
  const axis = document.getElementById('ff-axis');
  axis.innerHTML = '';
  const steps = 7;
  for (let i = 0; i <= steps; i++) {
    const d = Math.round(FF_MAX_M * i / steps);
    const span = document.createElement('span');
    span.textContent = d + 'm';
    axis.appendChild(span);
  }
})();

function ffClear() {
  ffCtx.fillStyle = '#000';
  ffCtx.fillRect(0, 0, FF_W, FF_H);
  _ffLastTs = null;
}
ffClear();

function ffDrawColumn(echoB64) {
  // Decode base64 → Uint8Array
  const bin   = atob(echoB64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  // Shift canvas left by 1px
  const img = ffCtx.getImageData(1, 0, FF_W - 1, FF_H);
  ffCtx.putImageData(img, 0, 0);

  // Draw new column on the right edge
  const col = ffCtx.createImageData(1, FF_H);
  const d   = col.data;
  for (let py = 0; py < FF_H; py++) {
    const echoIdx = Math.min(FF_ECHO_N - 1, (py / FF_H * FF_ECHO_N) | 0);
    const amp     = bytes[echoIdx];
    d[py*4]   = _ffLUT[amp*3];
    d[py*4+1] = _ffLUT[amp*3+1];
    d[py*4+2] = _ffLUT[amp*3+2];
    d[py*4+3] = 255;
  }
  ffCtx.putImageData(col, FF_W - 1, 0);
}

function ffHandleUpdate(msg) {
  if (!ffVisible) return;
  // Detect seek: ts jumped backwards or by more than 2s
  if (_ffLastTs !== null && (msg.ts < _ffLastTs || msg.ts - _ffLastTs > 2.0)) {
    ffClear();
  }
  _ffLastTs = msg.ts;
  if (msg.echo) ffDrawColumn(msg.echo);
}

document.getElementById('btn-ff').addEventListener('click', () => {
  ffVisible = !ffVisible;
  ffPanel.style.display = ffVisible ? 'flex' : 'none';
  document.getElementById('btn-ff').classList.toggle('active', ffVisible);
});

let coneVisible = true;
document.getElementById('btn-cone').addEventListener('click', () => {
  coneVisible = !coneVisible;
  forwardCone.visible = coneVisible;
  document.getElementById('btn-cone').classList.toggle('active', coneVisible);
});

// ─────────────────────────────────────────────────────────────────────────────
//  Forward-facing fish finder
//  Must mirror constants in src/synthetic/forward_scan.py
// ─────────────────────────────────────────────────────────────────────────────
const FF_FWD_N_BEAMS    = 60;
const FF_FWD_N_RANGE    = 128;
const FF_FWD_N_AZIMUTH  = 24;
const FF_FWD_AZ_HALF_DEG = 30.0;  // ±30° horizontal sweep
const FF_FWD_MAX_RANGE  = 40.0;   // metres
const FF_FWD_MIN_DEG    = 5.0;
const FF_FWD_MAX_DEG    = 64.0;
const FF_FWD_MAX_FWD_M  = 35.0;   // canvas x extent (forward metres)
const FF_FWD_MAX_DEPTH_M = 22.0;  // canvas y extent (depth metres)

const ffFwdCanvas = document.getElementById('ff-fwd-canvas');
const ffFwdCtx    = ffFwdCanvas.getContext('2d');
const FF_FWD_W    = ffFwdCanvas.width;
const FF_FWD_H    = ffFwdCanvas.height;

// Precompute pixel → (beam_idx, range_idx) lookup table
// Each entry: [beam_idx (int16), range_idx (int16)], -1 = out of range
const _fwdLUT = new Int16Array(FF_FWD_W * FF_FWD_H * 2).fill(-1);
(function buildFwdLUT() {
  for (let py = 0; py < FF_FWD_H; py++) {
    for (let px = 0; px < FF_FWD_W; px++) {
      const fwd_m   = (px / FF_FWD_W) * FF_FWD_MAX_FWD_M;
      const depth_m = (py / FF_FWD_H) * FF_FWD_MAX_DEPTH_M;
      const range_m = Math.sqrt(fwd_m * fwd_m + depth_m * depth_m);
      const theta   = Math.atan2(depth_m, fwd_m) * 180 / Math.PI;
      const b = Math.round((theta - FF_FWD_MIN_DEG) /
                (FF_FWD_MAX_DEG - FF_FWD_MIN_DEG) * (FF_FWD_N_BEAMS - 1));
      const r = Math.floor(range_m / FF_FWD_MAX_RANGE * FF_FWD_N_RANGE);
      const i = (py * FF_FWD_W + px) * 2;
      if (b >= 0 && b < FF_FWD_N_BEAMS && r >= 0 && r < FF_FWD_N_RANGE) {
        _fwdLUT[i]   = b;
        _fwdLUT[i+1] = r;
      }
    }
  }
})();

// Range and depth grid lines drawn on top of each frame
function _fwdDrawGrid() {
  ffFwdCtx.strokeStyle = 'rgba(74,224,200,0.18)';
  ffFwdCtx.lineWidth = 0.5;
  ffFwdCtx.font = '8px Courier New';
  ffFwdCtx.fillStyle = 'rgba(74,224,200,0.55)';

  // Vertical range lines every 10m forward
  for (let fm = 10; fm < FF_FWD_MAX_FWD_M; fm += 10) {
    const px = fm / FF_FWD_MAX_FWD_M * FF_FWD_W;
    ffFwdCtx.beginPath();
    ffFwdCtx.moveTo(px, 0); ffFwdCtx.lineTo(px, FF_FWD_H);
    ffFwdCtx.stroke();
    ffFwdCtx.fillText(fm + 'm', px + 2, 10);
  }
  // Horizontal depth lines every 5m
  for (let dm = 5; dm < FF_FWD_MAX_DEPTH_M; dm += 5) {
    const py = dm / FF_FWD_MAX_DEPTH_M * FF_FWD_H;
    ffFwdCtx.beginPath();
    ffFwdCtx.moveTo(0, py); ffFwdCtx.lineTo(FF_FWD_W, py);
    ffFwdCtx.stroke();
    ffFwdCtx.fillText(dm + 'm', 2, py - 2);
  }
}

// Max-project across azimuth: collapse the 3D wedge to a 2D (beam, range)
// frame by taking the maximum amplitude over all azimuth slices. Off-axis
// returns appear at their true (forward, depth) position.
const _fwdProjected = new Uint8Array(FF_FWD_N_BEAMS * FF_FWD_N_RANGE);

function ffDrawForward(fwdB64) {
  const bin   = atob(fwdB64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  const slabSize = FF_FWD_N_BEAMS * FF_FWD_N_RANGE;
  _fwdProjected.fill(0);
  for (let a = 0; a < FF_FWD_N_AZIMUTH; a++) {
    const off = a * slabSize;
    for (let i = 0; i < slabSize; i++) {
      const v = bytes[off + i];
      if (v > _fwdProjected[i]) _fwdProjected[i] = v;
    }
  }

  const img = ffFwdCtx.createImageData(FF_FWD_W, FF_FWD_H);
  const d   = img.data;

  for (let py = 0; py < FF_FWD_H; py++) {
    for (let px = 0; px < FF_FWD_W; px++) {
      const li  = (py * FF_FWD_W + px) * 2;
      const b   = _fwdLUT[li];
      const r   = _fwdLUT[li + 1];
      const pi  = (py * FF_FWD_W + px) * 4;
      if (b < 0) {
        d[pi] = d[pi+1] = d[pi+2] = 0; d[pi+3] = 255;
        continue;
      }
      const amp = _fwdProjected[b * FF_FWD_N_RANGE + r];
      d[pi]   = _ffLUT[amp * 3];
      d[pi+1] = _ffLUT[amp * 3 + 1];
      d[pi+2] = _ffLUT[amp * 3 + 2];
      d[pi+3] = 255;
    }
  }

  ffFwdCtx.putImageData(img, 0, 0);
  _fwdDrawGrid();
}

// Tab switching
let _ffMode = 'down';   // 'down' | 'fwd'

document.getElementById('ff-tab-down').addEventListener('click', () => {
  _ffMode = 'down';
  document.getElementById('ff-tab-down').classList.add('active');
  document.getElementById('ff-tab-fwd').classList.remove('active');
  document.getElementById('ff-wrap').style.display = 'flex';
  ffFwdCanvas.style.display = 'none';
});

document.getElementById('ff-tab-fwd').addEventListener('click', () => {
  _ffMode = 'fwd';
  document.getElementById('ff-tab-fwd').classList.add('active');
  document.getElementById('ff-tab-down').classList.remove('active');
  document.getElementById('ff-wrap').style.display = 'none';
  ffFwdCanvas.style.display = 'block';
});

// ─────────────────────────────────────────────────────────────────────────────
//  Render loop
// ─────────────────────────────────────────────────────────────────────────────
// FPS counter: average over a 1 s sliding window
let _fpsLast = performance.now(), _fpsCount = 0;
function _fpsTick(now) {
  _fpsCount++;
  if (now - _fpsLast >= 1000) {
    document.getElementById('hud-fps').textContent =
      Math.round(_fpsCount * 1000 / (now - _fpsLast));
    _fpsLast = now;
    _fpsCount = 0;
  }
}

function animate() {
  requestAnimationFrame(animate);
  _applyWASD();
  controls.update();
  renderer.render(scene, camera);
  _fpsTick(performance.now());
}
animate();
</script>
